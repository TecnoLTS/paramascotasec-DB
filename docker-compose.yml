services:
  db:
    image: postgres:16-alpine
    container_name: next-test-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?Define POSTGRES_USER en .env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Define POSTGRES_PASSWORD en .env}
      POSTGRES_DB: ${POSTGRES_DB:?Define POSTGRES_DB en .env}
      TZ: America/Bogota
    ports:
      - "${POSTGRES_BIND_IP:?Define POSTGRES_BIND_IP en .env}:${POSTGRES_PORT:?Define POSTGRES_PORT en .env}:5432"
    volumes:
      # Datos de Postgres 16 (ya migrados)
      - ./postgres16_data:/var/lib/postgresql/data
      # Carpeta para backups .sql o .dump
      - ./backups:/backups
    networks:
      edge:
        aliases:
          - db
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:?Define POSTGRES_USER en .env}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  edge:
    external: true
    name: edge
